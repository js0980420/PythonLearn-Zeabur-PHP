# Zeabur 部署配置 - Python協作教學平台
name: pythonlearn-collaboration

services:
  # 主應用服務 (PHP + WebSocket 整合在同一端口)
  app:
    # 構建配置
    build:
      buildCommand: |
        composer install --no-dev --optimize-autoloader
        echo "✅ PHP 依賴安裝完成"
    
    # 啟動配置 - 使用整合式WebSocket代理
    start: |
      php -S 0.0.0.0:8080 router.php
    
    # 環境變數
    envs:
      # 運行環境
      ZEABUR_DOMAIN: ${ZEABUR_WEB_DOMAIN}
      ENVIRONMENT: production
      
      # WebSocket 配置 (整合到HTTP服務器)
      WEBSOCKET_ENABLED: true
      WEBSOCKET_INTERNAL_PORT: 8081
      
      # 數據庫配置 (Zeabur MySQL 服務)
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: python_collaboration
      MYSQL_PORT: 3306
      
      # AI 配置
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-3.5-turbo
      OPENAI_MAX_TOKENS: 1000
      OPENAI_TEMPERATURE: 0.3
      
      # 應用配置
      MAX_CONCURRENT_USERS: 100
      MAX_ROOMS: 50
      MAX_USERS_PER_ROOM: 8
    
    # 端口配置 - 只使用8080端口
    ports:
      - port: 8080
        name: http
    
    # 健康檢查
    healthcheck:
      path: /health
      interval: 30s
      timeout: 10s
    
    # 域名配置
    domains:
      - ${ZEABUR_WEB_DOMAIN}

  # MySQL 數據庫服務
  mysql:
    image: mysql:8.0
    envs:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: python_collaboration
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    
    # 持久化存儲
    volumes:
      - mysql-data:/var/lib/mysql

# 卷配置
volumes:
  mysql-data:

# 🌐 網路配置
networks:
  default:
    driver: bridge

# 📊 監控配置
monitoring:
  enabled: true
  metrics:
    - name: http_requests_total
      type: counter
      help: "Total HTTP requests"
    
    - name: websocket_connections
      type: gauge
      help: "Active WebSocket connections"
    
    - name: ai_requests_total
      type: counter
      help: "Total AI assistant requests"
    
    - name: python_executions_total
      type: counter
      help: "Total Python code executions"

# 🔍 日誌配置
logging:
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"
  
  # 日誌聚合
  aggregation:
    enabled: true
    retention: 7d

# ⚙️ 配置檔案映射
configs:
  apache-config:
    file: ./apache-config.conf
    target: /etc/apache2/sites-available/000-default.conf
  
  supervisor-config:
    file: ./supervisor.conf
    target: /etc/supervisor/conf.d/pythonlearn.conf
  
  start-script:
    file: ./start.sh
    target: /usr/local/bin/start.sh
    mode: 0755

# 🔐 密鑰管理
secrets:
  openai-api-key:
    external: true
    name: OPENAI_API_KEY
  
  mysql-root-password:
    external: true
    name: MYSQL_ROOT_PASSWORD
  
  session-secret:
    external: true
    name: SESSION_SECRET 
# Zeabur 部署配置 - Python協作教學平台 (三服務架構)
name: pythonlearn-collaboration

services:
  # MySQL 數據庫服務
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pythonlearn_collaboration
      MYSQL_USER: pythonlearn_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  # Caddy 反向代理服務 (主要入口)
  caddy:
    # 使用自定義 Dockerfile
    build:
      dockerfile: Dockerfile.caddy
    
    # 端口配置 (Zeabur 會自動處理 TLS)
    ports:
      - 80
      - 443
    
    # 環境變數
    envs:
      ZEABUR_WEB_DOMAIN: ${ZEABUR_WEB_DOMAIN}
      CADDY_ADMIN: "off"
    
    # 依賴其他服務
    depends_on:
      - php
      - websocket
  
  # PHP Web 服務
  php:
    # 構建配置
    build:
      buildCommand: |
        composer install --no-dev --optimize-autoloader
        echo "✅ PHP 依賴安裝完成"
    
    # 啟動 PHP 內建伺服器 (僅處理 HTTP)
    start: |
      php -S 0.0.0.0:8080 router.php
    
    # 內部端口 (不對外開放)
    ports:
      - 8080
    
    # 環境變數
    envs:
      # 運行環境
      ENVIRONMENT: production
      
      # 數據庫配置
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: pythonlearn_collaboration
      MYSQL_USER: pythonlearn_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      
      # AI 配置
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-3.5-turbo
      OPENAI_MAX_TOKENS: 1000
      OPENAI_TEMPERATURE: 0.3
      
      # 應用配置
      MAX_CONCURRENT_USERS: 100
      MAX_ROOMS: 50
      MAX_USERS_PER_ROOM: 8
      
      # WebSocket 配置
      WEBSOCKET_HOST: websocket
      WEBSOCKET_PORT: 8081
      WEBSOCKET_ENABLED: true
      
      # 域名（Zeabur 自動設置）
      ZEABUR_DOMAIN: ${ZEABUR_DOMAIN}
    
    # 健康檢查
    healthcheck:
      path: /api/health
      interval: 30s
      timeout: 10s
    depends_on:
      - mysql
    restart: unless-stopped

  # WebSocket 服務 (Ratchet)
  websocket:
    # 構建配置
    build:
      buildCommand: |
        composer install --no-dev --optimize-autoloader
        echo "✅ WebSocket 依賴安裝完成"
    
    # 啟動 WebSocket 伺服器
    start: |
      php websocket/server.php
    
    # 內部端口 (不對外開放)
    ports:
      - 8081
    
    # 環境變數
    envs:
      # WebSocket 配置
      WEBSOCKET_ENABLED: true
      WEBSOCKET_PORT: 8081
      WEBSOCKET_HOST: 0.0.0.0
      ENVIRONMENT: production
      
      # 數據庫配置 (與 PHP 服務相同)
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: pythonlearn_collaboration
      MYSQL_USER: pythonlearn_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    
    # 重啟策略
    restart: unless-stopped
    depends_on:
      - mysql

# 部署配置
deploy:
  auto: true
  
  # 環境變數需求
  envs:
    required:
      - OPENAI_API_KEY
    optional:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_PASSWORD

# 🌐 網路配置
networks:
  default:
    driver: bridge

# 📊 監控配置
monitoring:
  enabled: true
  metrics:
    - name: http_requests_total
      type: counter
      help: "Total HTTP requests"
    
    - name: websocket_connections
      type: gauge
      help: "Active WebSocket connections"
    
    - name: caddy_requests_total
      type: counter
      help: "Total Caddy proxy requests"
    
    - name: ai_requests_total
      type: counter
      help: "Total AI assistant requests"
    
    - name: python_executions_total
      type: counter
      help: "Total Python code executions"

# 🔍 日誌配置
logging:
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"
  
  # 日誌聚合
  aggregation:
    enabled: true
    retention: 7d

# 🔐 密鑰管理
secrets:
  openai-api-key:
    external: true
    name: OPENAI_API_KEY
  
  mysql-root-password:
    external: true
    name: MYSQL_ROOT_PASSWORD
  
  mysql-password:
    external: true
    name: MYSQL_PASSWORD

# 卷配置
volumes:
  mysql_data:
    driver: local

# 健康檢查配置
healthcheck:
  php:
    path: /api/health
    interval: 30s
    timeout: 10s
    retries: 3
    
  websocket:
    port: 8081
    interval: 30s
    timeout: 10s
    retries: 3

# 環境變數配置
env:
  # MySQL 密碼（需要在 Zeabur 控制台設置）
  MYSQL_ROOT_PASSWORD:
    type: secret
    default: "secure_root_password_2024"
    
  MYSQL_PASSWORD:
    type: secret
    default: "secure_user_password_2024"
    
  # OpenAI API 密鑰（需要在 Zeabur 控制台設置）
  OPENAI_API_KEY:
    type: secret
    
  # 域名（Zeabur 自動設置）
  ZEABUR_DOMAIN:
    type: auto 